services:
  - type: web
    name: senko-tips-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_USER_IDS
        sync: false
      - key: TIMEZONE
        value: America/Los_Angeles
      - key: WEBHOOK_PATH
        value: telegram
      - key: WEBHOOK_SECRET
        generateValue: true
